name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-blog
  cancel-in-progress: false

jobs:
  ci:
    name: vet + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: blog/go.mod
          cache-dependency-path: blog/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

  deploy:
    name: cross-compile + rsync + restart
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: blog/go.mod
          cache-dependency-path: blog/go.sum

      - name: cross-compile linux/amd64
        working-directory: blog
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/blog ./cmd/server
          ls -l ../dist/blog

      - name: install SSH key + known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: snapshot current binary for rollback
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            if [ -x /opt/blog/blog ]; then
              cp -f /opt/blog/blog /opt/blog/blog.prev
            fi
          '

      - name: rsync new binary
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          rsync -avz --chmod=0755 \
            -e "ssh -o StrictHostKeyChecking=yes" \
            dist/blog \
            "$SSH_USER@$SSH_HOST:/opt/blog/blog.new"

      - name: atomic swap + restart + health check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            mv /opt/blog/blog.new /opt/blog/blog
            sudo systemctl restart blog

            # Give the service a moment to bind :8080, then verify.
            sleep 2
            systemctl is-active --quiet blog || {
              echo "blog service is not active after restart" >&2
              exit 1
            }
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8080/healthz >/dev/null; then
                echo "healthz ok"
                exit 0
              fi
              sleep 2
            done
            echo "healthz never returned 200" >&2
            exit 1
          '

      - name: rollback on failure
        if: failure()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            if [ -x /opt/blog/blog.prev ]; then
              echo "rolling back to /opt/blog/blog.prev"
              mv /opt/blog/blog.prev /opt/blog/blog
              sudo systemctl restart blog
              sleep 2
              if systemctl is-active --quiet blog \
                 && curl -fsS http://localhost:8080/healthz >/dev/null; then
                echo "rollback restored a healthy service"
              else
                echo "rollback did not restore health — service is down" >&2
              fi
            else
              echo "no blog.prev to roll back to" >&2
            fi
          '
