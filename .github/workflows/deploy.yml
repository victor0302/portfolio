name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-blog
  cancel-in-progress: false

jobs:
  ci:
    name: vet + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blog
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: blog/go.mod
          cache-dependency-path: blog/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

  deploy:
    name: cross-compile + rsync + restart
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: blog/go.mod
          cache-dependency-path: blog/go.sum

      - name: cross-compile linux/amd64
        working-directory: blog
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          go build -trimpath -ldflags="-s -w" -o ../dist/blog ./cmd/server
          ls -l ../dist/blog

      - name: install SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # Defend against trailing whitespace / CRLF in SSH_HOST or SSH_USER
      # secrets (a paste in the GH UI can easily slip a newline in). Re-mask
      # the cleaned values so they don't leak into logs.
      - name: sanitize SSH host/user
        env:
          RAW_SSH_HOST: ${{ secrets.SSH_HOST }}
          RAW_SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          clean_host=$(printf '%s' "$RAW_SSH_HOST" | tr -d '[:space:]')
          clean_user=$(printf '%s' "$RAW_SSH_USER" | tr -d '[:space:]')
          echo "::add-mask::$clean_host"
          echo "::add-mask::$clean_user"
          {
            echo "SSH_HOST=$clean_host"
            echo "SSH_USER=$clean_user"
          } >> "$GITHUB_ENV"

      # Scan the live host key instead of relying on a stored secret.
      # Tradeoff: vulnerable to active MITM during the first scan, but the
      # SSH_KNOWN_HOSTS secret was fragile to paste mistakes — this is the
      # standard CI pattern for personal-scale deploys.
      - name: scan host key
        run: |
          ssh-keyscan -t ed25519 "$SSH_HOST" 2>/dev/null > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ssh-keyscan returned no keys for $SSH_HOST" >&2
            exit 1
          fi

      - name: snapshot current binary for rollback
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            if [ -x /opt/blog/blog ]; then
              cp -f /opt/blog/blog /opt/blog/blog.prev
            fi
          '

      - name: rsync new binary
        run: |
          rsync -avz --chmod=0755 \
            -e "ssh -o StrictHostKeyChecking=yes" \
            dist/blog \
            "$SSH_USER@$SSH_HOST:/opt/blog/blog.new"

      - name: atomic swap + restart + health check
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            mv /opt/blog/blog.new /opt/blog/blog
            sudo systemctl restart blog

            # Give the service a moment to bind :8080, then verify.
            sleep 2
            systemctl is-active --quiet blog || {
              echo "blog service is not active after restart" >&2
              exit 1
            }
            for i in 1 2 3 4 5; do
              if curl -fsS http://localhost:8080/healthz >/dev/null; then
                echo "healthz ok"
                exit 0
              fi
              sleep 2
            done
            echo "healthz never returned 200" >&2
            exit 1
          '

      - name: rollback on failure
        if: failure()
        run: |
          ssh "$SSH_USER@$SSH_HOST" '
            set -e
            if [ -x /opt/blog/blog.prev ]; then
              echo "rolling back to /opt/blog/blog.prev"
              mv /opt/blog/blog.prev /opt/blog/blog
              sudo systemctl restart blog
              sleep 2
              if systemctl is-active --quiet blog \
                 && curl -fsS http://localhost:8080/healthz >/dev/null; then
                echo "rollback restored a healthy service"
              else
                echo "rollback did not restore health — service is down" >&2
              fi
            else
              echo "no blog.prev to roll back to" >&2
            fi
          '
